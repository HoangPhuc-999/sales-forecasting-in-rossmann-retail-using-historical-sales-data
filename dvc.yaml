stages:
  processing:
    cmd: .\.venv\Scripts\python.exe -m rossmann_mlops.processing --config configs/config.yaml
    deps:
      - configs/config.yaml
      - src/rossmann_mlops/config.py
      - src/rossmann_mlops/processing.py
      - data/raw/train.csv
      - data/raw/test.csv
      - data/raw/store.csv
    outs:
      - data/processed/train_final.csv
      - data/processed/val_final.csv
      - data/processed/test_final.csv

  train:
    cmd: .\.venv\Scripts\python.exe scripts/run_pipeline.py --config configs/config.yaml
    deps:
      - scripts/run_pipeline.py
      - configs/config.yaml
      - src/rossmann_mlops/config.py
      - src/rossmann_mlops/train_model.py
      - data/processed/train_final.csv
      - data/processed/val_final.csv
    params:
      - configs/config.yaml:
          - paths.train_final_data
          - paths.val_final_data
          - paths.model_file
          - paths.metrics_file
          - paths.model_config_file
          - training.production_train
          - training.n_estimators
          - training.random_state
          - training.n_jobs
    outs:
      - artifacts/models/rossmann_model.joblib
      - artifacts/models/store_dw_promo_mapping.pkl
      - artifacts/models/month_mapping.pkl
      - artifacts/models/global_mean_sales.pkl
      - artifacts/metrics/metrics.json

  monitor:
    cmd: .\.venv\Scripts\python.exe scripts/monitor.py --config configs/config.yaml
    deps:
      - scripts/monitor.py
      - configs/config.yaml
      - src/rossmann_mlops/config.py
      - src/rossmann_mlops/monitoring.py
      - data/raw/train.csv
      - data/raw/test.csv
      - data/raw/store.csv
      - artifacts/metrics/metrics.json
    params:
      - configs/config.yaml:
          - monitoring.drift_alert_threshold
          - monitoring.rmse_alert_threshold
          - monitoring.mae_alert_threshold
          - monitoring.monitoring_report_file
          - monitoring.alert_file
          - paths.metrics_file
          - paths.store_data
    outs:
      - logs/

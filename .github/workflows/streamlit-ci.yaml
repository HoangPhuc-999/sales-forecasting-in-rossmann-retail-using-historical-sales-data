name: Rossmann Streamlit App

on:
  push:
    paths:
      - 'app/**'
      - 'src/**'
      - 'configs/**'
      - 'pyproject.toml'
      - 'requirements.txt'
      - 'requirements.api.txt'
      - 'Dockerfile.api'
      - 'Dockerfile.streamlit'
      - 'docker-compose.yaml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      HAS_DOCKER_CREDS: ${{ vars.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare API image build context
        run: |
          mkdir -p artifacts/models data/raw
          if [ ! -f data/raw/store.csv ]; then
            printf 'Store,StoreType,Assortment,CompetitionDistance,Promo2,Promo2SinceWeek,Promo2SinceYear,CompetitionOpenSinceMonth,CompetitionOpenSinceYear,PromoInterval\n' > data/raw/store.csv
          fi

      - name: Log in to DockerHub Container Registry
        if: ${{ env.HAS_DOCKER_CREDS == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Continue without Docker push credentials
        if: ${{ env.HAS_DOCKER_CREDS != 'true' }}
        run: echo "DockerHub credentials not configured. Running build-only smoke checks."

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.api
          target: api
          push: ${{ env.HAS_DOCKER_CREDS == 'true' }}
          tags: |
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-api:latest
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-api:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Streamlit image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.streamlit
          target: streamlit
          push: ${{ env.HAS_DOCKER_CREDS == 'true' }}
          tags: |
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-streamlit:latest
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-streamlit:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: Rossmann Pipeline

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch: {}
  schedule:
    - cron: "0 2 * * 1"

concurrency:
  group: rossmann-mlops-pipeline
  cancel-in-progress: true

env:
  CONFIG_PATH: configs/config.yaml
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION }}
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

jobs:
  # Job 1: Data Processing - Pull and prepare data
  data-processing:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      data-hash: ${{ steps.data-hash.outputs.hash }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install only DVC dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "dvc[s3]>=3.67.1"

      - name: Pull DVC data from S3 (optional)
        if: ${{ env.AWS_ACCESS_KEY_ID != '' && env.AWS_SECRET_ACCESS_KEY != '' }}
        run: |
          dvc pull data/raw/train.csv data/raw/store.csv data/raw/test.csv

      - name: Ensure required data files exist
        run: |
          test -f data/raw/train.csv || (echo "Missing data/raw/train.csv. Configure DVC access or commit sample data." && exit 1)
          test -f data/raw/store.csv || (echo "Missing data/raw/store.csv. Configure DVC access or commit sample data." && exit 1)
          test -f data/raw/test.csv || (echo "Missing data/raw/test.csv. Configure DVC access or commit sample data." && exit 1)

      - name: Generate data hash for artifact naming
        id: data-hash
        run: |
          HASH=$(cat data/raw/train.csv data/raw/store.csv data/raw/test.csv | md5sum | cut -d' ' -f1 | head -c 8)
          echo "hash=$HASH" >> $GITHUB_OUTPUT

      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: processed-data-${{ steps.data-hash.outputs.hash }}
          path: |
            data/raw/train.csv
            data/raw/store.csv
            data/raw/test.csv
          retention-days: 1

  # Job 2: Model Training - Train model using processed data
  model-training:
    needs: data-processing
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      model-version: ${{ steps.train.outputs.model-version }}
      should-promote: ${{ steps.promotion-gate.outputs.should-promote }}
      promotion-reason: ${{ steps.promotion-gate.outputs.promotion-reason }}
      promotion-metric: ${{ steps.promotion-gate.outputs.promotion-metric }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data-${{ needs.data-processing.outputs.data-hash }}
          path: .

      - name: Normalize downloaded data layout
        run: |
          mkdir -p data/raw
          [ -f train.csv ] && [ ! -f data/raw/train.csv ] && mv train.csv data/raw/train.csv || true
          [ -f store.csv ] && [ ! -f data/raw/store.csv ] && mv store.csv data/raw/store.csv || true
          [ -f test.csv ] && [ ! -f data/raw/test.csv ] && mv test.csv data/raw/test.csv || true

      - name: Ensure training data files exist
        run: |
          test -f data/raw/train.csv || (echo "Missing data/raw/train.csv after artifact download" && exit 1)
          test -f data/raw/store.csv || (echo "Missing data/raw/store.csv after artifact download" && exit 1)

      - name: Create artifact directories
        run: |
          mkdir -p artifacts/models artifacts/metrics
          mkdir -p mlruns

      - name: Capture baseline metrics before training
        run: |
          if [ -f artifacts/metrics/metrics.json ]; then
            cp artifacts/metrics/metrics.json artifacts/metrics/metrics_baseline.json
            echo "Baseline metrics captured"
          else
            echo "No baseline metrics found. First promotion will be allowed."
          fi

      - name: Run training pipeline with MLflow tracking
        id: train
        run: |
          python scripts/run_pipeline.py --config ${CONFIG_PATH}
          
          # Extract model version from MLflow or artifacts
          MODEL_VERSION=$(date +%s)
          echo "model-version=$MODEL_VERSION" >> $GITHUB_OUTPUT

      - name: Evaluate quality gate for model promotion
        id: promotion-gate
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          candidate_path = Path("artifacts/metrics/metrics.json")
          baseline_path = Path("artifacts/metrics/metrics_baseline.json")

          if not candidate_path.exists():
            raise SystemExit(f"Candidate metrics not found: {candidate_path}")

          candidate = json.loads(candidate_path.read_text(encoding="utf-8"))
          baseline = None
          if baseline_path.exists():
            baseline = json.loads(baseline_path.read_text(encoding="utf-8"))

          chosen_metric = None
          for metric_name in ("val_rmspe", "rmse"):
            if metric_name in candidate and (baseline is None or metric_name in baseline):
              chosen_metric = metric_name
              break

          if chosen_metric is None:
            if baseline is None:
              should_promote = True
              reason = "no_baseline_metrics"
              chosen_metric = "none"
            else:
              should_promote = False
              reason = "missing_comparable_metric"
              chosen_metric = "none"
          elif baseline is None:
            should_promote = True
            reason = f"no_baseline_{chosen_metric}"
          else:
            candidate_value = float(candidate[chosen_metric])
            baseline_value = float(baseline[chosen_metric])
            should_promote = candidate_value < baseline_value
            if should_promote:
              reason = f"improved_{chosen_metric}:{candidate_value:.6f}<{baseline_value:.6f}"
            else:
              reason = f"not_improved_{chosen_metric}:{candidate_value:.6f}>={baseline_value:.6f}"

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as out:
            out.write(f"should-promote={'true' if should_promote else 'false'}\n")
            out.write(f"promotion-reason={reason}\n")
            out.write(f"promotion-metric={chosen_metric}\n")

          print(f"should_promote={should_promote}")
          print(f"reason={reason}")
          print(f"metric={chosen_metric}")
          PY

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts-${{ github.sha }}
          path: |
            artifacts/
            mlruns/
          retention-days: 7
          if-no-files-found: ignore

  # Job 3: Monitoring & Evaluation - Validate model performance
  monitoring-and-evaluation:
    needs: [data-processing, model-training]
    runs-on: ubuntu-latest

    outputs:
      should-retrain: ${{ steps.retrain-gate.outputs.should-retrain }}
      retrain-reason: ${{ steps.retrain-gate.outputs.retrain-reason }}
      severe-drift-count: ${{ steps.retrain-gate.outputs.severe-drift-count }}
      rmse-exceeds-threshold: ${{ steps.retrain-gate.outputs.rmse-exceeds-threshold }}

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data-${{ needs.data-processing.outputs.data-hash }}
          path: .

      - name: Normalize downloaded data layout
        run: |
          mkdir -p data/raw
          [ -f train.csv ] && [ ! -f data/raw/train.csv ] && mv train.csv data/raw/train.csv || true
          [ -f store.csv ] && [ ! -f data/raw/store.csv ] && mv store.csv data/raw/store.csv || true
          [ -f test.csv ] && [ ! -f data/raw/test.csv ] && mv test.csv data/raw/test.csv || true

      - name: Ensure monitoring data files exist
        run: |
          test -f data/raw/train.csv || (echo "Missing data/raw/train.csv after artifact download" && exit 1)
          test -f data/raw/test.csv || (echo "Missing data/raw/test.csv after artifact download" && exit 1)

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts-${{ github.sha }}
          path: ./

      - name: Check if model artifacts exist
        run: |
          if [ -d "artifacts/models" ]; then
            echo "✅ Model artifacts found"
            ls -la artifacts/models/ || echo "No models in artifacts/models"
          else
            echo "⚠️ Warning: Model artifacts not found. Monitoring will proceed without trained model."
          fi

      - name: Run monitoring with MLflow logging
        run: |
          python scripts/monitor.py --reference data/raw/train.csv --current data/raw/test.csv --config ${CONFIG_PATH}

      - name: Evaluate retrain gate from monitoring report
        id: retrain-gate
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          import yaml

          config_path = Path(os.environ.get("CONFIG_PATH", "configs/config.yaml"))
          with config_path.open("r", encoding="utf-8") as f:
            config = yaml.safe_load(f) or {}

          monitoring_cfg = config.get("monitoring", {})
          rmse_threshold = float(monitoring_cfg.get("rmse_alert_threshold", float("inf")))
          report_file = Path(monitoring_cfg.get("monitoring_report_file", "logs/monitoring_report.jsonl"))

          if not report_file.exists():
            raise SystemExit(f"Monitoring report not found: {report_file}")

          lines = [line for line in report_file.read_text(encoding="utf-8").splitlines() if line.strip()]
          if not lines:
            raise SystemExit(f"Monitoring report is empty: {report_file}")

          report = json.loads(lines[-1])
          drift_results = report.get("drift", [])
          severe_drift_count = sum(1 for item in drift_results if item.get("status") == "severe_drift")

          performance = report.get("performance", {})
          rmse_value = performance.get("rmse")
          rmse_exceeds = rmse_value is not None and float(rmse_value) > rmse_threshold

          should_retrain = severe_drift_count > 0 or rmse_exceeds

          reasons = []
          if severe_drift_count > 0:
            reasons.append(f"severe_drift_columns={severe_drift_count}")
          if rmse_exceeds:
            reasons.append(f"rmse={float(rmse_value):.4f}>{rmse_threshold:.4f}")
          if report.get("alert"):
            reasons.append("alert_logged=true")

          reason_text = "; ".join(reasons) if reasons else "none"

          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as out:
            out.write(f"should-retrain={'true' if should_retrain else 'false'}\n")
            out.write(f"retrain-reason={reason_text}\n")
            out.write(f"severe-drift-count={severe_drift_count}\n")
            out.write(f"rmse-exceeds-threshold={'true' if rmse_exceeds else 'false'}\n")

          print(f"should_retrain={should_retrain}")
          print(f"reason={reason_text}")
          PY

      - name: Upload monitoring and evaluation results
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-results-${{ github.sha }}
          path: |
            artifacts/**
            logs/**
            mlruns/**
          retention-days: 30

  # Job 4: Controlled auto-retraining - runs only when drift/performance gate is triggered
  controlled-auto-retrain:
    needs: [data-processing, monitoring-and-evaluation]
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' && needs.monitoring-and-evaluation.outputs.should-retrain == 'true' && vars.AUTO_RETRAIN_ENABLED != 'false' }}

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data-${{ needs.data-processing.outputs.data-hash }}
          path: .

      - name: Normalize downloaded data layout
        run: |
          mkdir -p data/raw
          [ -f train.csv ] && [ ! -f data/raw/train.csv ] && mv train.csv data/raw/train.csv || true
          [ -f store.csv ] && [ ! -f data/raw/store.csv ] && mv store.csv data/raw/store.csv || true
          [ -f test.csv ] && [ ! -f data/raw/test.csv ] && mv test.csv data/raw/test.csv || true

      - name: Log retrain trigger reason
        run: |
          echo "Auto-retrain gate passed"
          echo "Reason: ${{ needs.monitoring-and-evaluation.outputs.retrain-reason }}"

      - name: Run controlled retraining
        run: |
          python scripts/retrain.py --config ${CONFIG_PATH}

      - name: Upload retraining artifacts
        uses: actions/upload-artifact@v4
        with:
          name: retrain-results-${{ github.sha }}
          path: |
            artifacts/**
            logs/**
            mlruns/**
          retention-days: 30

  # Job 5: Build and Publish Docker image (Multi-platform)
  build-and-publish:
    needs: [data-processing, model-training]
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' && needs.model-training.outputs.should-promote == 'true' }}

    permissions:
      contents: read
      packages: write

    env: 
      HAS_DOCKER_TOKEN: ${{ secrets.DOCKERHUB_TOKEN != '' }}
      HAS_GH_TOKEN: ${{ secrets.GITHUB_TOKEN != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log promotion decision
        run: |
          echo "Promotion gate passed"
          echo "Metric: ${{ needs.model-training.outputs.promotion-metric }}"
          echo "Reason: ${{ needs.model-training.outputs.promotion-reason }}"

      - name: Download model artifacts
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts-${{ github.sha }}
          path: .

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data-${{ needs.data-processing.outputs.data-hash }}
          path: .

      - name: Normalize downloaded data layout for image build
        run: |
          mkdir -p data/raw
          [ -f store.csv ] && [ ! -f data/raw/store.csv ] && mv store.csv data/raw/store.csv || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ env.HAS_DOCKER_TOKEN == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        if: ${{ env.HAS_GH_TOKEN == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "version=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
          echo "git-sha=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Select Docker platforms
        id: platforms
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
          else
            echo "value=linux/amd64" >> $GITHUB_OUTPUT
          fi

      - name: Normalize repository name for GHCR tags
        id: ghcr
        run: |
          REPO_LC=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "repo-lc=$REPO_LC" >> $GITHUB_OUTPUT

      - name: Build and push API image (DockerHub + GHCR)
        if: ${{ env.HAS_DOCKER_TOKEN == 'true' && env.HAS_GH_TOKEN == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          target: api
          push: true
          platforms: ${{ steps.platforms.outputs.value }}
          tags: |
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-api:latest
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-api:${{ github.sha }}
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-api:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.ghcr.outputs.repo-lc }}-api:latest
            ghcr.io/${{ steps.ghcr.outputs.repo-lc }}-api:${{ github.sha }}
            ghcr.io/${{ steps.ghcr.outputs.repo-lc }}-api:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API image (DockerHub only)
        if: ${{ env.HAS_DOCKER_TOKEN == 'true' && env.HAS_GH_TOKEN != 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          target: api
          push: true
          platforms: ${{ steps.platforms.outputs.value }}
          tags: |
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-api:latest
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-api:${{ github.sha }}
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-api:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push API image (GHCR only)
        if: ${{ env.HAS_DOCKER_TOKEN != 'true' && env.HAS_GH_TOKEN == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.api
          target: api
          push: true
          platforms: ${{ steps.platforms.outputs.value }}
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.repo-lc }}-api:latest
            ghcr.io/${{ steps.ghcr.outputs.repo-lc }}-api:${{ github.sha }}
            ghcr.io/${{ steps.ghcr.outputs.repo-lc }}-api:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Streamlit image (DockerHub + GHCR)
        if: ${{ env.HAS_DOCKER_TOKEN == 'true' && env.HAS_GH_TOKEN == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.streamlit
          target: streamlit
          push: true
          platforms: ${{ steps.platforms.outputs.value }}
          tags: |
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-streamlit:latest
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-streamlit:${{ github.sha }}
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-streamlit:${{ steps.meta.outputs.version }}
            ghcr.io/${{ steps.ghcr.outputs.repo-lc }}-streamlit:latest
            ghcr.io/${{ steps.ghcr.outputs.repo-lc }}-streamlit:${{ github.sha }}
            ghcr.io/${{ steps.ghcr.outputs.repo-lc }}-streamlit:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Streamlit image (DockerHub only)
        if: ${{ env.HAS_DOCKER_TOKEN == 'true' && env.HAS_GH_TOKEN != 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.streamlit
          target: streamlit
          push: true
          platforms: ${{ steps.platforms.outputs.value }}
          tags: |
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-streamlit:latest
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-streamlit:${{ github.sha }}
            docker.io/${{ vars.DOCKERHUB_USERNAME }}/rossmann-mlops-streamlit:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Streamlit image (GHCR only)
        if: ${{ env.HAS_DOCKER_TOKEN != 'true' && env.HAS_GH_TOKEN == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.streamlit
          target: streamlit
          push: true
          platforms: ${{ steps.platforms.outputs.value }}
          tags: |
            ghcr.io/${{ steps.ghcr.outputs.repo-lc }}-streamlit:latest
            ghcr.io/${{ steps.ghcr.outputs.repo-lc }}-streamlit:${{ github.sha }}
            ghcr.io/${{ steps.ghcr.outputs.repo-lc }}-streamlit:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Skip Docker push when credentials are missing
        if: ${{ env.HAS_DOCKER_TOKEN != 'true' && env.HAS_GH_TOKEN != 'true' }}
        run: |
          echo "Docker credentials missing. Push skipped."
          echo "Set DOCKERHUB_USERNAME var and DOCKERHUB_TOKEN secret for Docker Hub push"
global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: rossmann-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: rossmann-model-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - model-metrics-exporter:9108
